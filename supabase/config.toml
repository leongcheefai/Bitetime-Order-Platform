# Supabase CLI config. Link to the hosted project with:
#   supabase link --project-ref wthglouiidzyljzcprku
# then push migrations:
#   supabase db push
project_id = "bitetime-app"

# Ports bumped to the 553xx range so this project can run alongside another
# local Supabase instance (e.g. "fuelie") that holds the default 543xx ports.
[api]
enabled = true
port = 55321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 55322
shadow_port = 55320
major_version = 15

[studio]
enabled = true
port = 55323

[inbucket]
enabled = true
port = 55324

[analytics]
enabled = true
port = 55327

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
