# Pings the billing backend's /health every ~5 min so the Railway container
# stays warm. A cold start adds 1–3s to the first request (e.g. merchant
# approval) because Node reboots and TLS pools to Supabase/Stripe reopen.
#
# GitHub cron is best-effort — runs can be delayed several minutes under load,
# so this reduces cold starts rather than eliminating them. For a hard
# guarantee use an external uptime monitor (UptimeRobot / cron-job.org) or a
# Railway plan without app sleeping.
#
# Override the target without editing this file by setting a repo variable
# BACKEND_HEALTH_URL (Settings → Secrets and variables → Actions → Variables).
name: keep-warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend /health
        run: |
          URL="${BACKEND_HEALTH_URL:-https://bitetimebackend-production.up.railway.app/health}"
          echo "Pinging $URL"
          code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 30 "$URL" || echo 000)
          echo "HTTP $code"
          test "$code" = "200"
        env:
          BACKEND_HEALTH_URL: ${{ vars.BACKEND_HEALTH_URL }}
